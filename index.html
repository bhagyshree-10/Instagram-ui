
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">Instagram</div>
        <input type="text" class="search-bar" placeholder="Search">
        <div>👤 Profile</div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="menu-item">🏠 Feed</div>
            <div class="menu-item">🔍 Explore</div>
            <div class="menu-item">🎬 Reels</div>
            <div class="menu-item">💬 Messages</div>
            <div class="menu-item">⚙️ Settings</div>
        </div>

       <!-- Feed Section -->
        <div class="feed">
            
            <!-- Stories Section -->
            <div class="stories-container">
                <div class="story">
                    <img src="Snapchat-570041653.jpg" alt="Story">
                    <span>Your story</span>
                </div>
                <div class="story">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Story">
                    <span>friend_1</span>
                </div>
                <div class="story">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Story">
                    <span>friend_2</span>
                </div>
                <div class="story">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Story">
                    <span>friend_3</span>
                </div>
                <div class="story">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Story">
                    <span>friend_4</span>
                </div>
                <div class="story">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Story">
                    <span>friend_5</span>
                </div>
                <div class="story">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Story">
                    <span>friend_5</span>
                </div>
                <div class="story">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Story">
                    <span>friend_6</span>
                </div>
            </div>
            
            <!-- Post 1 -->
            <div class="post">
                <div class="post-header">
                    <img src="Snapchat-570041653.jpg" alt="User">
                    <span class="username">bhagyshree_10</span>
                </div>
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmVhY2h8ZW58MHx8MHx8fDA%3D" class="post-image" alt="Post">
                <div class="post-actions">
                    <div class="action-buttons">❤️ 💬 📤</div>
                    <p class="likes">1,234 likes</p>
                    <p class="caption"><strong>bhagyshree_10</strong> Amazing day! 🌅</p>
                </div>
            </div>

            <!-- Post 2 -->
            <div class="post">
                <div class="post-header">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" alt="User">
                    <span class="username">travel_diaries</span>
                </div>
                <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_rp_progressive&w=740&q=80" class="post-image" alt="Post">
                <div class="post-actions">
                    <div class="action-buttons">❤️ 💬 📤</div>
                    <p class="likes">2,456 likes</p>
                    <p class="caption"><strong>travel_diaries</strong> Beach life 🏖️</p>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
